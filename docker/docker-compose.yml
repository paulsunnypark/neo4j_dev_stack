name: neo_stacker

services:
  postgres:
    image: postgres:16
    container_name: neo4j_dev_postgres
    ports:
      - "5435:5432"
    environment:
      - POSTGRES_DB=ha_core
      - POSTGRES_USER=ha
      - POSTGRES_PASSWORD=ha_password_change_me
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ha -d ha_core"]
      interval: 10s
      timeout: 5s
      retries: 30

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: neo_stacker_api
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=${NEO4J_URI}
      - NEO4J_USER=${NEO4J_USER}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - NEO4J_DATABASE=${NEO4J_DATABASE}
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_DB=ha_core
      - PG_USER=ha
      - PG_PASSWORD=ha_password_change_me
      - API_KEY=dev-secret-key-change-me
      - CORS_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
      - LOG_LEVEL=INFO
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 30

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: neo_stacker_ui
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_API_KEY=dev-secret-key-change-me
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ../frontend/src:/app/src
      - ../frontend/public:/app/public
volumes:
  pg_data:
